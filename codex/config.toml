# Model: change to match your account (run `codex --available-models`)
model = "gpt-5.3-codex"
model_context_window = 200000
approval_mode = "full-auto"

# Sandbox: danger-full-access needed for audits — reads methodology from ~/.codex/,
# runs toolchain commands (forge, cargo, stellar), writes to .scratchpad/.
# command_guard.py PreToolUse hook blocks dangerous commands (rm -rf, sudo, etc.)
sandbox_mode = "danger-full-access"

[agents]
max_threads = 8
max_depth = 1

# MCP servers are OPTIONAL. The pipeline falls back to grep + shell commands.
# To enable: uncomment, replace paths with ABSOLUTE paths, add API keys.
