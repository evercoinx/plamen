            Identify invariants: conservation laws, monotonicity constraints,
            access control boundaries, temporal ordering requirements.

            Write to {SCRATCHPAD}/semantic_invariants.md

            PLATFORM: On Windows (PowerShell), translate bash commands from methodology:
- grep/rg -> Get-ChildItem -Recurse | Select-String
- find -> Get-ChildItem -Recurse -Filter
- cat -> Get-Content; wc -l -> (Get-Content file).Count
- Do NOT use fc, glob **/*.sol, or Set-Content -NoNewline
- If git commands fail, skip and note "not a git repo"

            SCOPE: Write ONLY to your assigned output file. Do NOT proceed to
            subsequent pipeline phases. Return your invariants and stop.

## HARD STOP RULE (MANDATORY)
You are a SINGLE-PHASE worker. Your job is ONLY to produce your assigned output file(s).

FORBIDDEN ACTIONS:
- Do NOT write ANY file other than your assigned output
- Do NOT analyze code for phases beyond your assignment
- Do NOT write findings_inventory.md, hypotheses.md, verify_*.md, report_*.md, or AUDIT_REPORT.md
- Do NOT run forge test or write PoC code (that is the verifier's job)
- Do NOT spawn sub-agents

When your assigned output file is written, STOP IMMEDIATELY.
Return a one-line summary: "DONE: {filename} written with {N} invariants"
Do NOT continue with "next steps" or "let me also analyze..."
"""
